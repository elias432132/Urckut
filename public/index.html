<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urckut - Cyber Social OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* MANTIDO O SEU CSS ORIGINAL COM ALGUMAS ADIÇÕES PARA GALERIA E AMIGOS */
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f0ff;
            --neon-purple: #da00ff;
            --neon-green: #39ff14;
            --neon-red: #ff3333;
            --neon-orange: #ffaa00;
            --neon-yellow: #ffff00;
            --bg-dark: #05070a;
            --glass-bg: rgba(16, 20, 31, 0.7);
            --glass-border: rgba(0, 240, 255, 0.15);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--neon-blue), var(--neon-purple)); border-radius: 10px; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        h1, h2, h3, h4, .box-title, .nome-usuario, .btn-neon, .menu-navegacao button { font-family: 'Rajdhani', sans-serif; text-transform: uppercase; letter-spacing: 1px; }

        #universo-neon { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }

        @keyframes rainbow-border {
            0% { border-color: var(--neon-pink); box-shadow: 0 0 20px var(--neon-pink); }
            50% { border-color: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); }
            100% { border-color: var(--neon-pink); box-shadow: 0 0 20px var(--neon-pink); }
        }

        .btn-neon { background: transparent; color: white; border: 2px solid; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 700; transition: all 0.3s ease; }
        .btn-blue { border-color: var(--neon-blue); background: rgba(0, 240, 255, 0.1); color: var(--neon-blue); }
        .btn-blue:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
        .btn-green { border-color: var(--neon-green); background: rgba(57, 255, 20, 0.1); color: var(--neon-green); }
        .btn-green:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 20px var(--neon-green); }
        .btn-pink { border-color: var(--neon-pink); background: rgba(255, 0, 127, 0.1); color: var(--neon-pink); }
        .btn-pink:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 20px var(--neon-pink); }
        .btn-purple { border-color: var(--neon-purple); background: rgba(218, 0, 255, 0.1); color: var(--neon-purple); }
        .btn-purple:hover { background: var(--neon-purple); color: #fff; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 25px; border-radius: 8px; color: #000; font-weight: 700; background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }

        .login-body { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 10; }
        .login-container { background: var(--glass-bg); backdrop-filter: blur(15px); padding: 50px 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; border: 2px solid var(--neon-pink); animation: rainbow-border 4s infinite; }
        .login-container h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-pink); font-size: 56px; margin: 0; text-shadow: 0 0 20px rgba(255, 0, 127, 0.8); }
        .login-container input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid rgba(0, 240, 255, 0.3); border-radius: 10px; background: rgba(0, 0, 0, 0.5); color: white; }

        header { background: rgba(10, 14, 23, 0.95); backdrop-filter: blur(20px); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--glass-border); position: sticky; top: 0; z-index: 100; }
        header h2 { margin: 0; color: var(--neon-pink); font-family: 'Orbitron', sans-serif; font-size: 32px; text-shadow: 0 0 15px rgba(255, 0, 127, 0.7); cursor: pointer; }
        .menu-navegacao { display: flex; gap: 8px; flex-wrap: wrap; }
        .menu-navegacao button { background: none; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer; font-weight: 600; padding: 10px 14px; border-radius: 8px; }
        .menu-navegacao button:hover, .menu-navegacao button.ativo { color: var(--neon-blue); background: rgba(0, 240, 255, 0.1); text-shadow: 0 0 10px var(--neon-blue); }

        .container { max-width: 1000px; margin: 25px auto; padding: 0 20px; }
        
        .box { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .box-title { color: var(--neon-blue); font-size: 18px; border-bottom: 2px solid rgba(0, 240, 255, 0.2); padding-bottom: 10px; margin-bottom: 15px; }

        .area-postagem textarea { width: 100%; height: 80px; background: rgba(0, 0, 0, 0.3); border: 2px solid rgba(0, 240, 255, 0.2); border-radius: 10px; padding: 12px; color: white; outline: none; resize: none; }
        .area-postagem textarea:focus { border-color: var(--neon-blue); }
        .ferramentas-post { display: flex; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        
        .post-feed { border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding: 18px 0; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-header img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--neon-blue); object-fit: cover; }
        .post-header-info strong { color: var(--neon-blue); font-size: 15px; display: block; }
        .post-header-info span { font-size: 11px; color: var(--text-muted); }
        .post-content img { max-width: 100%; border-radius: 10px; margin-top: 10px; }
        
        .reacoes { display: flex; gap: 10px; margin-top: 12px; font-size: 13px; }
        .reacoes button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        .reacoes button.curtido { color: var(--neon-pink); border-color: var(--neon-pink); background: rgba(255, 0, 127, 0.2); }

        /* LISTA DE AMIGOS E USUÁRIOS */
        .user-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .user-card { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.5); padding: 15px; border: 1px solid var(--neon-purple); border-radius: 10px; }
        .user-card img { width: 60px; height: 60px; border-radius: 50%; }
        
        /* GALERIA */
        .grid-galeria { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .item-galeria { border: 2px solid var(--neon-blue); border-radius: 10px; overflow: hidden; height: 200px; }
        .item-galeria img { width: 100%; height: 100%; object-fit: cover; }

        /* CHAT */
        .chat-container { display: flex; height: 600px; border: 2px solid var(--glass-border); border-radius: 12px; }
        .chat-lista { width: 30%; background: rgba(0,0,0,0.6); border-right: 2px solid var(--glass-border); overflow-y: auto; }
        .chat-janela { width: 70%; display: flex; flex-direction: column; background: rgba(16, 20, 31, 0.4); }
        .chat-contato { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; gap: 10px; align-items: center; }
        .chat-contato:hover, .chat-contato.ativo { background: rgba(0, 240, 255, 0.15); border-left: 4px solid var(--neon-blue); }
        .chat-balao { max-width: 80%; padding: 10px 15px; border-radius: 15px; margin: 10px; font-size: 14px; }
        .balao-recebido { background: rgba(255, 0, 127, 0.2); border: 1px solid var(--neon-pink); align-self: flex-start; }
        .balao-enviado { background: rgba(0, 240, 255, 0.2); border: 1px solid var(--neon-blue); align-self: flex-end; }
        
        /* MARKETPLACE E COMUNIDADES MANTIDOS */
        .grid-marketplace { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; }
        .item-mercado { background: rgba(0,0,0,0.5); border: 2px solid var(--neon-purple); border-radius: 12px; padding: 12px; text-align: center; }
        .item-mercado img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; }
        .preco-neon { color: var(--neon-green); font-size: 22px; font-weight: bold; margin: 12px 0; }
        .comunidade-card { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 15px; border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 15px; }

    </style>
</head>
<body>
    <canvas id="universo-neon" aria-hidden="true"></canvas>
    <div id="toast-container"></div>

    <div id="tela-login" class="login-body">
        <div class="login-container">
            <h1>URCKUT</h1>
            <p>The Cybernetic Social Operating System</p>
            <input type="text" id="login-nome" placeholder="Seu Nickname (apenas para registro)" style="display: none;">
            <input type="email" id="login-email" placeholder="Endereço de Rede">
            <input type="password" id="login-senha" placeholder="Chave de Acesso">
            
            <button id="btn-acessar" class="btn-neon btn-pink" style="width: 100%; margin-top: 20px;" onclick="logar()">
                <i class="fas fa-sign-in-alt"></i> Acessar Matriz
            </button>
            <button id="btn-registrar" class="btn-neon btn-blue" style="width: 100%; margin-top: 10px;" onclick="mostrarRegistro()">
                Criar Nova Identidade
            </button>
            <button id="btn-fazer-registro" class="btn-neon btn-green" style="width: 100%; margin-top: 20px; display: none;" onclick="registrar()">
                Finalizar Cadastro
            </button>
            <button id="btn-voltar-login" class="btn-neon btn-purple" style="width: 100%; margin-top: 10px; display: none;" onclick="mostrarLogin()">
                Voltar
            </button>
        </div>
    </div>

    <div id="area-logada" style="display: none;">
        <header>
            <h2 onclick="navegarPara('tela-perfil')">URCKUT</h2>
            <nav class="menu-navegacao">
                <button onclick="navegarPara('tela-perfil')" class="ativo" id="btn-perfil">FEED</button>
                <button onclick="navegarPara('tela-amigos')" id="btn-amigos">REDE / AMIGOS</button>
                <button onclick="navegarPara('tela-galeria')" id="btn-galeria">GALERIA 📷</button>
                <button onclick="navegarPara('tela-mensagens')" id="btn-mensagens">INBOX 💬</button>
                <button onclick="navegarPara('tela-comunidades')" id="btn-comunidades">COMUNIDADES</button>
                <button onclick="navegarPara('tela-marketplace')" id="btn-marketplace">MERCADO</button>
                <button onclick="sair()" id="btn-sair" style="color: var(--neon-red)">SAIR</button>
            </nav>
        </header>

        <main class="container">
            <section id="tela-perfil" class="AbaDinamica">
                <div class="box">
                    <div class="box-title">TERMINAL DE TRANSMISSÃO <span>📡</span></div>
                    <div class="area-postagem">
                        <textarea id="caixaTexto" placeholder="O que você está injetando na rede mundial hoje?"></textarea>
                        <input type="text" id="linkImagem" placeholder="Link de uma imagem (Opcional)" style="width: 100%; padding: 10px; margin-top: 10px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--neon-blue); border-radius: 5px;">
                        <div class="ferramentas-post">
                            <button class="btn-neon btn-blue" onclick="postar()" style="margin-left: auto;">
                                <i class="fas fa-paper-plane"></i> Publicar
                            </button>
                        </div>
                    </div>
                </div>
                <div id="muralDeRecados"></div>
            </section>

            <section id="tela-amigos" class="AbaDinamica" style="display: none;">
                <div class="box">
                    <div class="box-title">Cidadãos da Rede <span>👥</span></div>
                    <div id="lista-usuarios" class="user-grid"></div>
                </div>
            </section>

            <section id="tela-galeria" class="AbaDinamica" style="display: none;">
                <div class="box">
                    <div class="box-title">Upload para a Matriz <span>📷</span></div>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <input type="text" id="urlGaleria" placeholder="URL da Imagem ou GIF" style="flex: 1; padding: 10px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--neon-pink); border-radius: 5px;">
                        <button class="btn-neon btn-pink" onclick="adicionarGaleria()">Salvar na Galeria</button>
                    </div>
                    <div id="grid-fotos" class="grid-galeria"></div>
                </div>
            </section>

            <section id="tela-mensagens" class="AbaDinamica" style="display: none;">
                <div class="box" style="padding: 0; border: none;">
                    <div class="chat-container">
                        <div class="chat-lista" id="lista-contatos-chat">
                            </div>
                        <div class="chat-janela">
                            <div style="padding: 15px; border-bottom: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3);">
                                <strong id="chat-nome-contato" style="color: var(--neon-pink); font-size: 16px;">Selecione um contato</strong>
                            </div>
                            <div id="chat-mensagens" style="flex: 1; padding: 15px; display: flex; flex-direction: column; overflow-y: auto;">
                                </div>
                            <div style="padding: 15px; border-top: 2px solid rgba(255,255,255,0.1); display: flex; gap: 10px; background: rgba(0,0,0,0.3);">
                                <input type="text" id="chat-input" placeholder="Digite uma mensagem..." style="flex: 1; background: rgba(0,0,0,0.6); border: 2px solid var(--neon-blue); color: white; padding: 12px; border-radius: 8px; outline: none;" onkeypress="if(event.key==='Enter') enviarMensagemReal()">
                                <button class="btn-neon btn-blue" onclick="enviarMensagemReal()"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="tela-comunidades" class="AbaDinamica" style="display: none;">
                <div class="box">
                    <div class="box-title">Comunidades <span>🌍</span></div>
                    <div id="lista-comunidades-reais"></div>
                </div>
            </section>

            <section id="tela-marketplace" class="AbaDinamica" style="display: none;">
                <div class="box">
                    <div class="box-title">Marketplace Neon <span>🛒</span></div>
                    <div id="grid-mercado-real" class="grid-marketplace"></div>
                </div>
            </section>

        </main>
    </div>

    <script>
        const API_URL = '/api'; 
        let currentUser = null;
        let token = localStorage.getItem('urckut_token');
        let chatUsuarioAtualId = null;
        let chatInterval = null;

        // VERIFICA SE JÁ ESTÁ LOGADO
        window.onload = () => {
            if (token) {
                const userString = localStorage.getItem('urckut_user');
                if (userString) {
                    currentUser = JSON.parse(userString);
                    entrarInterface();
                } else {
                    sair();
                }
            }
        };

        // UI & NAVEGAÇÃO
        function showToast(msg, cor = 'var(--neon-blue)') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = cor;
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function navegarPara(idTela) {
            document.querySelectorAll('.AbaDinamica').forEach(aba => aba.style.display = 'none');
            document.querySelectorAll('.menu-navegacao button').forEach(btn => btn.classList.remove('ativo'));
            
            document.getElementById(idTela).style.display = 'block';
            const btnId = 'btn-' + idTela.replace('tela-', '');
            const btn = document.getElementById(btnId);
            if(btn) btn.classList.add('ativo');

            // Carrega os dados baseado na tela atual
            if (idTela === 'tela-perfil') carregarPosts();
            if (idTela === 'tela-amigos') carregarUsuarios();
            if (idTela === 'tela-galeria') carregarGaleria();
            if (idTela === 'tela-comunidades') carregarComunidades();
            if (idTela === 'tela-marketplace') carregarMarketplace();
            if (idTela === 'tela-mensagens') carregarContatosChat();

            // Limpa loop de mensagens caso saia da tela
            if (idTela !== 'tela-mensagens') {
                clearInterval(chatInterval);
                chatUsuarioAtualId = null;
            }
        }

        function entrarInterface() {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('area-logada').style.display = 'block';
            navegarPara('tela-perfil');
            showToast('Conectado à Matriz!', 'var(--neon-green)');
        }

        // AUTENTICAÇÃO REAL
        function mostrarRegistro() {
            document.getElementById('login-nome').style.display = 'block';
            document.getElementById('btn-acessar').style.display = 'none';
            document.getElementById('btn-registrar').style.display = 'none';
            document.getElementById('btn-fazer-registro').style.display = 'block';
            document.getElementById('btn-voltar-login').style.display = 'block';
        }

        function mostrarLogin() {
            document.getElementById('login-nome').style.display = 'none';
            document.getElementById('btn-acessar').style.display = 'block';
            document.getElementById('btn-registrar').style.display = 'block';
            document.getElementById('btn-fazer-registro').style.display = 'none';
            document.getElementById('btn-voltar-login').style.display = 'none';
        }

        async function logar() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            if (!email || !senha) return showToast('Preencha tudo!', 'var(--neon-red)');

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                const data = await res.json();
                if (data.error) return showToast(data.error, 'var(--neon-red)');
                
                salvarSessao(data.token, data.user);
            } catch (e) { showToast('Erro de conexão.', 'var(--neon-red)'); }
        }

        async function registrar() {
            const nome = document.getElementById('login-nome').value;
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            if (!email || !senha || !nome) return showToast('Preencha tudo!', 'var(--neon-red)');

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha, nome })
                });
                const data = await res.json();
                if (data.error) return showToast(data.error, 'var(--neon-red)');
                
                salvarSessao(data.token, data.user);
            } catch (e) { showToast('Erro de conexão.', 'var(--neon-red)'); }
        }

        function salvarSessao(t, u) {
            token = t;
            currentUser = u;
            if (!currentUser.amigos) currentUser.amigos = [];
            localStorage.setItem('urckut_token', token);
            localStorage.setItem('urckut_user', JSON.stringify(currentUser));
            entrarInterface();
        }

        function sair() {
            localStorage.removeItem('urckut_token');
            localStorage.removeItem('urckut_user');
            token = null; currentUser = null;
            clearInterval(chatInterval);
            document.getElementById('area-logada').style.display = 'none';
            document.getElementById('tela-login').style.display = 'flex';
        }

        // FETCH HELPER
        async function api(endpoint, method = 'GET', body = null) {
            const options = { method, headers: { 'Authorization': `Bearer ${token}` } };
            if (body) {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(body);
            }
            const res = await fetch(`${API_URL}${endpoint}`, options);
            return await res.json();
        }

        // POSTS REAIS
        async function carregarPosts() {
            const posts = await api('/posts');
            const mural = document.getElementById('muralDeRecados');
            mural.innerHTML = '';
            
            posts.forEach(post => {
                const ehCurtido = post.curtidoPor.includes(currentUser.id);
                let html = `
                    <div class="post-feed">
                        <div class="post-header">
                            <img src="${post.avatar}">
                            <div class="post-header-info">
                                <strong>${post.usuario}</strong>
                                <span>Público 🌍</span>
                            </div>
                        </div>
                        <div class="post-content">
                            ${post.texto}
                            ${post.imagem ? `<br><img src="${post.imagem}">` : ''}
                        </div>
                        <div class="reacoes">
                            <button onclick="curtirPost('${post.id}')" class="${ehCurtido ? 'curtido' : ''}">
                                <i class="fas fa-heart"></i> ${post.curtidas}
                            </button>
                        </div>
                    </div>`;
                mural.insertAdjacentHTML('beforeend', html);
            });
        }

        async function postar() {
            const texto = document.getElementById('caixaTexto').value;
            const imagem = document.getElementById('linkImagem').value;
            if (!texto && !imagem) return showToast('Escreva algo ou envie imagem!', 'var(--neon-red)');
            
            await api('/posts', 'POST', { texto, imagem });
            document.getElementById('caixaTexto').value = '';
            document.getElementById('linkImagem').value = '';
            carregarPosts();
            showToast('Postado!', 'var(--neon-green)');
        }

        async function curtirPost(id) {
            await api(`/posts/${id}/curtir`, 'POST');
            carregarPosts();
        }

        // AMIGOS (REDE) REAIS
        async function carregarUsuarios() {
            const users = await api('/users');
            const grid = document.getElementById('lista-usuarios');
            grid.innerHTML = '';
            
            users.forEach(u => {
                if (u.id === currentUser.id) return; // Nao mostra vc mesmo
                const eAmigo = currentUser.amigos.includes(u.id);
                const btnClass = eAmigo ? 'btn-red' : 'btn-green';
                const btnText = eAmigo ? 'Remover Amigo' : 'Adicionar Amigo';
                
                grid.insertAdjacentHTML('beforeend', `
                    <div class="user-card">
                        <img src="${u.avatar}">
                        <div>
                            <strong style="color:var(--neon-blue); display:block; margin-bottom:5px;">${u.nome}</strong>
                            <button class="btn-neon ${btnClass}" style="padding: 5px 10px; font-size:12px;" onclick="toggleAmigo('${u.id}')">${btnText}</button>
                        </div>
                    </div>
                `);
            });
        }

        async function toggleAmigo(id) {
            const res = await api(`/users/${id}/amigo`, 'POST');
            currentUser.amigos = res.amigos;
            localStorage.setItem('urckut_user', JSON.stringify(currentUser));
            carregarUsuarios();
            showToast('Rede atualizada!', 'var(--neon-purple)');
        }

        // GALERIA REAL
        async function carregarGaleria() {
            const fotos = await api('/galeria');
            const grid = document.getElementById('grid-fotos');
            grid.innerHTML = '';
            fotos.forEach(f => {
                grid.insertAdjacentHTML('beforeend', `
                    <div class="item-galeria">
                        <img src="${f.url}" alt="Foto">
                    </div>
                `);
            });
        }

        async function adicionarGaleria() {
            const url = document.getElementById('urlGaleria').value;
            if(!url) return;
            await api('/galeria', 'POST', { url });
            document.getElementById('urlGaleria').value = '';
            carregarGaleria();
            showToast('Salvo na Galeria!', 'var(--neon-green)');
        }

        // CHAT REAL (ONLINE POLLING)
        async function carregarContatosChat() {
            const users = await api('/users');
            const lista = document.getElementById('lista-contatos-chat');
            lista.innerHTML = '';
            
            // Filtra só quem é amigo
            const amigos = users.filter(u => currentUser.amigos.includes(u.id));
            if(amigos.length === 0) {
                lista.innerHTML = '<p style="padding:15px; color:var(--text-muted);">Adicione amigos na aba "Rede" para conversar.</p>';
                return;
            }

            amigos.forEach(a => {
                const ativoClass = (a.id === chatUsuarioAtualId) ? 'ativo' : '';
                lista.insertAdjacentHTML('beforeend', `
                    <div class="chat-contato ${ativoClass}" onclick="abrirChatReal('${a.id}', '${a.nome}')">
                        <img src="${a.avatar}" style="width:40px; height:40px; border-radius:50%; border: 1px solid var(--neon-blue);">
                        <strong>${a.nome}</strong>
                    </div>
                `);
            });
        }

        function abrirChatReal(userId, nome) {
            chatUsuarioAtualId = userId;
            document.getElementById('chat-nome-contato').textContent = nome;
            carregarContatosChat(); // Para atualizar a classe 'ativo'
            puxarMensagensReais();
            
            clearInterval(chatInterval);
            chatInterval = setInterval(puxarMensagensReais, 3000); // Poll a cada 3s
        }

        async function puxarMensagensReais() {
            if(!chatUsuarioAtualId) return;
            const msgs = await api(`/mensagens/${chatUsuarioAtualId}`);
            const janela = document.getElementById('chat-mensagens');
            janela.innerHTML = '';
            
            msgs.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(m => {
                const tipo = m.de === currentUser.id ? 'balao-enviado' : 'balao-recebido';
                janela.insertAdjacentHTML('beforeend', `<div class="chat-balao ${tipo}">${m.texto}</div>`);
            });
            janela.scrollTop = janela.scrollHeight;
        }

        async function enviarMensagemReal() {
            if(!chatUsuarioAtualId) return showToast('Selecione um contato!', 'var(--neon-red)');
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            if(!texto) return;
            
            await api('/mensagens', 'POST', { para: chatUsuarioAtualId, texto });
            input.value = '';
            puxarMensagensReais();
        }

        // COMUNIDADES E MERCADO
        async function carregarComunidades() {
            const data = await api('/comunidades');
            const div = document.getElementById('lista-comunidades-reais');
            div.innerHTML = '';
            data.forEach(c => {
                div.insertAdjacentHTML('beforeend', `
                    <div class="comunidade-card">
                        <div style="display:flex; gap:15px; align-items:center;">
                            <img src="${c.imagem}" style="width:60px; height:60px; border-radius:10px; border:2px solid var(--neon-blue);">
                            <div>
                                <h3 style="color:var(--neon-blue); margin:0;">${c.nome}</h3>
                                <p style="font-size:12px; color:var(--text-muted);">${c.membros} membros</p>
                            </div>
                        </div>
                    </div>
                `);
            });
        }

        async function carregarMarketplace() {
            const data = await api('/marketplace');
            const div = document.getElementById('grid-mercado-real');
            div.innerHTML = '';
            data.forEach(m => {
                div.insertAdjacentHTML('beforeend', `
                    <div class="item-mercado">
                        <img src="${m.imagem}">
                        <h4 style="margin:10px 0; color:white;">${m.titulo}</h4>
                        <div class="preco-neon">R$ ${m.preco}</div>
                        <p style="font-size:12px; color:var(--text-muted);">Vendedor: ${m.vendedor}</p>
                    </div>
                `);
            });
        }

        // BACKGROUND ANIMATION
        const canvas = document.getElementById('universo-neon');
        const ctx = canvas.getContext('2d');
        function redimensionar() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', redimensionar); redimensionar();
        const pts = []; for(let i=0; i<40; i++) pts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5});
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pts.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>canvas.width) p.vx*=-1; if(p.y<0||p.y>canvas.height) p.vy*=-1; ctx.fillStyle='#00f0ff'; ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fill(); });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
